<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness for Life — Installation Pipeline</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.4/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f4f5f7;
      --surface:  #ffffff;
      --surface2: #f0f2f5;
      --border:   rgba(0,0,0,0.09);
      --border2:  rgba(0,0,0,0.16);
      --text:     #111827;
      --muted:    #6b7280;
      --font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    input, select, textarea, button { font-family: var(--font); }

    .btn { cursor:pointer; border:1px solid var(--border2); background:var(--surface); color:var(--text); border-radius:8px; padding:6px 14px; font-size:13px; transition:background .15s,opacity .15s; white-space:nowrap; }
    .btn:hover { background:var(--surface2); }
    .btn.primary { background:#111827; color:#fff; border-color:#111827; }
    .btn.primary:hover { opacity:.85; }
    .btn.danger  { color:#ef4444; border-color:#ef4444; background:transparent; }
    .btn.danger:hover { background:rgba(239,68,68,.06); }
    .btn:disabled { opacity:.45; cursor:not-allowed; }

    .inp { width:100%; padding:8px 11px; border:1px solid var(--border2); border-radius:8px; font-size:13px; background:var(--surface); color:var(--text); outline:none; transition:border-color .15s; }
    .inp:focus { border-color:#111827; }
    .label { font-size:12px; color:var(--muted); margin-bottom:4px; display:block; font-weight:500; }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
    .card:hover { border-color:var(--border2); box-shadow:0 2px 10px rgba(0,0,0,.07); }

    .nav-tab { cursor:pointer; padding:6px 14px; border-radius:8px; font-size:13px; color:var(--muted); background:transparent; border:none; transition:all .15s; }
    .nav-tab:hover  { background:var(--surface2); color:var(--text); }
    .nav-tab.active { background:var(--surface2); color:var(--text); font-weight:600; }

    .badge { font-size:11px; padding:3px 9px; border-radius:20px; font-weight:600; white-space:nowrap; }
    .doc-chip { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:3px 8px; border-radius:6px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
    .section-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); margin-bottom:8px; }

    .overlay { position:fixed; inset:0; z-index:200; display:flex; background:rgba(0,0,0,0.35); }
    .drawer  { width:480px; margin-left:auto; background:var(--surface); height:100vh; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:16px; border-left:1px solid var(--border); }
    .modal-wrap { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal { background:var(--surface); border-radius:16px; border:1px solid var(--border); width:100%; max-width:580px; max-height:92vh; overflow-y:auto; padding:24px; }

    .pbar-track { height:5px; background:#e5e7eb; border-radius:3px; }
    .pbar-fill  { height:100%; border-radius:3px; transition:width .3s; }

    .upload-zone { border:2px dashed var(--border2); border-radius:10px; padding:18px; text-align:center; cursor:pointer; background:var(--surface2); transition:border-color .15s; }
    .upload-zone:hover { border-color:#6366f1; }

    /* Location color tags by island */
    .loc-pr    { background:#eef2ff; color:#4338ca; border:1px solid #c7d2fe; }
    .loc-dr    { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
    .loc-tc    { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; }
    .loc-bs    { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .loc-bb    { background:#fdf4ff; color:#7e22ce; border:1px solid #e9d5ff; }
    .loc-jm    { background:#fefce8; color:#a16207; border:1px solid #fef08a; }
    .loc-ky    { background:#f0fdfa; color:#0f766e; border:1px solid #99f6e4; }
    .loc-lc    { background:#fff1f2; color:#be123c; border:1px solid #fecdd3; }
    .loc-other { background:#f8fafc; color:#475569; border:1px solid #e2e8f0; }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }

    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty h3 { font-size:15px; color:var(--text); margin:12px 0 6px; font-weight:600; }
    .empty p  { font-size:13px; margin-bottom:20px; }

    @media(max-width:900px){ .pipeline-grid { grid-template-columns:repeat(2,1fr) !important; } .drawer { width:100%; } }
    @media(max-width:520px){ .pipeline-grid { grid-template-columns:1fr !important; } .form-row { grid-template-columns:1fr !important; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useCallback } = React;

  /* ─── Constants ─── */
  const STAGES = [
    { id:'quote',      label:'Quote / Proposal',  color:'#6366f1', bg:'rgba(99,102,241,.1)',  border:'rgba(99,102,241,.3)'  },
    { id:'po',         label:'PO Received',        color:'#d97706', bg:'rgba(217,119,6,.1)',   border:'rgba(217,119,6,.3)'   },
    { id:'production', label:'In Production',      color:'#ea580c', bg:'rgba(234,88,12,.1)',   border:'rgba(234,88,12,.3)'   },
    { id:'ready',      label:'Ready to Install',   color:'#16a34a', bg:'rgba(22,163,74,.1)',   border:'rgba(22,163,74,.3)'   },
    { id:'installed',  label:'Installed',          color:'#0891b2', bg:'rgba(8,145,178,.1)',   border:'rgba(8,145,178,.3)'   },
  ];

  const FLAGS = {
    'Puerto Rico':'🇵🇷','Dominican Republic':'🇩🇴','Turks and Caicos':'🇹🇨',
    'Bahamas':'🇧🇸','Jamaica':'🇯🇲','Barbados':'🇧🇧','Cayman Islands':'🇰🇾',
    'Saint Lucia':'🇱🇨','Antigua':'🇦🇬','Bermuda':'🇧🇲','Anguilla':'🇦🇮',
    'Grenada':'🇬🇩','Trinidad':'🇹🇹','St. Kitts':'🇰🇳','Guadeloupe':'🇬🇵',
    'Martinique':'🇲🇶','Dominica':'🇩🇲','Cuba':'🇨🇺','St. Vincent':'🇻🇨',
  };
  const LOC_CLASS = {
    'Puerto Rico':'loc-pr','Dominican Republic':'loc-dr','Turks and Caicos':'loc-tc',
    'Bahamas':'loc-bs','Barbados':'loc-bb','Jamaica':'loc-jm',
    'Cayman Islands':'loc-ky','Saint Lucia':'loc-lc',
  };

  const LEAD_MIN=10, LEAD_MAX=14, LEAD_MID=12;
  const KEY = 'ffl_pipeline_v2';

  const EMPTY = {
    name:'', client:'', contactRole:'', contactPhone:'', contactEmail:'', company:'',
    location:'', country:'', sqft:'', poNumber:'', poDate:'',
    installDate:'', stage:'quote', value:'', notes:'', documents:[],
  };

  /* ─── Helpers ─── */
  const stageOf   = id  => STAGES.find(s=>s.id===id)||STAGES[0];
  const weeksAgo  = d   => d ? Math.floor((Date.now()-new Date(d))/6048e5) : null;
  const daysUntil = d   => d ? Math.ceil((new Date(d)-Date.now())/864e5)  : null;
  const fmt       = d   => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
  const addDays   = (d,n)=> new Date(new Date(d).getTime()+n*864e5).toISOString().split('T')[0];
  const urgCol    = days => days===null?'#9ca3af':days<14?'#ef4444':days<45?'#d97706':'#16a34a';
  const flag      = c   => FLAGS[c]||'🌎';
  const locCls    = c   => LOC_CLASS[c]||'loc-other';
  const initials  = name=> (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

  const load = ()=>{ try{ const r=localStorage.getItem(KEY); return r?JSON.parse(r):[]; }catch{ return[]; }};
  const save = d =>{ try{ localStorage.setItem(KEY,JSON.stringify(d)); }catch{} };

  /* ═══════════════ APP ═══════════════════════════════════ */
  function App(){
    const [projects,set] = useState(load);
    const [view,setView] = useState('pipeline');
    const [form,setForm] = useState(false);
    const [editId,setEd] = useState(null);
    const [detId,setDet] = useState(null);

    const persist = useCallback(next=>{ set(next); save(next); },[]);
    const onSave  = data => {
      persist(editId
        ? projects.map(p=>p.id===editId?{...p,...data}:p)
        : [...projects,{...data,id:String(Date.now()),createdAt:new Date().toISOString()}]
      );
      setForm(false); setEd(null);
    };
    const onDel   = id => { persist(projects.filter(p=>p.id!==id)); setDet(null); };
    const onStage = (id,stage) => persist(projects.map(p=>p.id===id?{...p,stage}:p));
    const openEd  = id => { setEd(id); setForm(true); setDet(null); };

    const ep = editId ? projects.find(p=>p.id===editId) : null;
    const dp = detId  ? projects.find(p=>p.id===detId)  : null;

    return(
      <>
        {/* Header */}
        <header style={{borderBottom:'1px solid var(--border)',background:'var(--surface)',padding:'0 24px',display:'flex',alignItems:'center',gap:20,height:54,position:'sticky',top:0,zIndex:100}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:30,height:30,borderRadius:7,background:'#111827',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><rect x="2" y="7" width="4" height="10" rx="1"/><rect x="10" y="3" width="4" height="18" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/></svg>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.3px'}}>FITNESS FOR LIFE</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>Installation Pipeline</div>
            </div>
          </div>
          <nav style={{flex:1,display:'flex',gap:4}}>
            {[['pipeline','Pipeline'],['install','Install Schedule'],['all','All Projects']].map(([v,l])=>(
              <button key={v} className={`nav-tab${view===v?' active':''}`} onClick={()=>setView(v)}>{l}</button>
            ))}
          </nav>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <span style={{fontSize:12,color:'var(--muted)'}}>{projects.length} project{projects.length!==1?'s':''}</span>
            <button className="btn primary" onClick={()=>{setEd(null);setForm(true);}}>+ New Project</button>
          </div>
        </header>

        {/* Summary bar */}
        <div style={{display:'flex',gap:4,padding:'10px 24px',background:'var(--surface)',borderBottom:'1px solid var(--border)'}}>
          {STAGES.map(s=>{ const n=projects.filter(p=>p.stage===s.id).length; return(
            <div key={s.id} onClick={()=>setView('pipeline')} style={{flex:1,textAlign:'center',padding:'7px 4px',borderRadius:8,cursor:'pointer',background:n>0?s.bg:'transparent',transition:'background .15s'}}>
              <div style={{fontSize:20,fontWeight:700,color:n>0?s.color:'#d1d5db'}}>{n}</div>
              <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.2}}>{s.label}</div>
            </div>
          );})}
        </div>

        {/* Main */}
        <main style={{padding:'22px 24px'}}>
          {projects.length===0
            ? <div className="empty">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" strokeWidth="1.3" style={{display:'block',margin:'0 auto'}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                <h3>No projects yet</h3>
                <p>Add your first project to start tracking installations.</p>
                <button className="btn primary" onClick={()=>{setEd(null);setForm(true);}}>+ Add First Project</button>
              </div>
            : <>
                {view==='pipeline' && <PipelineView  projects={projects} onStage={onStage} onDetail={setDet}/>}
                {view==='install'  && <InstallView   projects={projects} onDetail={setDet}/>}
                {view==='all'      && <AllView       projects={projects} onDetail={setDet} onEdit={openEd}/>}
              </>
          }
        </main>

        {form && <ProjectForm project={ep} onSave={onSave} onClose={()=>{setForm(false);setEd(null);}}/>}
        {dp   && <DetailPanel project={dp} onClose={()=>setDet(null)} onEdit={openEd} onDelete={onDel} onStage={onStage}/>}
      </>
    );
  }

  /* ═══════════════ PIPELINE VIEW ═════════════════════════ */
  function PipelineView({projects,onStage,onDetail}){
    return(
      <div className="pipeline-grid" style={{display:'grid',gridTemplateColumns:'repeat(5,minmax(0,1fr))',gap:12}}>
        {STAGES.map(stage=>{
          const cards=projects.filter(p=>p.stage===stage.id);
          return(
            <div key={stage.id}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:10}}>
                <div style={{width:9,height:9,borderRadius:'50%',background:stage.color}}/>
                <span style={{fontSize:12,fontWeight:600}}>{stage.label}</span>
                <span style={{fontSize:11,marginLeft:'auto',background:cards.length?stage.bg:'var(--surface2)',color:cards.length?stage.color:'var(--muted)',borderRadius:20,padding:'1px 7px',fontWeight:600}}>{cards.length}</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,minHeight:80,background:stage.bg,borderRadius:12,padding:8,border:`1px solid ${stage.border}`}}>
                {cards.map(p=><PipelineCard key={p.id} project={p} stage={stage} onDetail={onDetail}/>)}
                {!cards.length && <div style={{textAlign:'center',padding:'18px 0',color:'var(--muted)',fontSize:12}}>Empty</div>}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  function PipelineCard({project,stage,onDetail}){
    const days=daysUntil(project.installDate);
    const weeks=weeksAgo(project.poDate);
    const pct=Math.min(100,Math.max(0,((weeks||0)/LEAD_MAX)*100));
    return(
      <div className="card" onClick={()=>onDetail(project.id)} style={{padding:12}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:5,lineHeight:1.3}}>{project.name}</div>
        {(project.location||project.country) && (
          <span className={`badge ${locCls(project.country)}`} style={{fontSize:10,marginBottom:5,display:'inline-flex',alignItems:'center',gap:4}}>
            <span>{flag(project.country)}</span>
            {[project.location,project.country].filter(Boolean).join(', ')}
          </span>
        )}
        {project.installDate && (
          <div style={{fontSize:11,fontWeight:600,color:urgCol(days),margin:'4px 0'}}>
            {days===null?'':days<0?`${Math.abs(days)}d overdue`:days===0?'Today!':`${days}d to install`}
          </div>
        )}
        {project.poDate && stage.id!=='quote' && (
          <div style={{marginTop:6}}>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:3}}>Week {weeks??0} of {LEAD_MIN}–{LEAD_MAX}</div>
            <div className="pbar-track"><div className="pbar-fill" style={{width:`${pct}%`,background:weeks>=LEAD_MID?'#16a34a':stage.color}}/></div>
          </div>
        )}
        {project.documents?.length>0 && <div style={{fontSize:10,color:'var(--muted)',marginTop:6}}>📎 {project.documents.length} doc{project.documents.length!==1?'s':''}</div>}
      </div>
    );
  }

  /* ═══════════════ INSTALL SCHEDULE ══════════════════════ */
  function InstallView({projects,onDetail}){
    const [groupBy,setGroupBy]=useState('month');

    const sorted=[...projects].sort((a,b)=>{
      if(!a.installDate&&!b.installDate)return 0;
      if(!a.installDate)return 1; if(!b.installDate)return -1;
      return new Date(a.installDate)-new Date(b.installDate);
    });

    const groups={};
    sorted.forEach(p=>{
      const key = groupBy==='month'
        ? (p.installDate ? new Date(p.installDate).toLocaleDateString('en-US',{month:'long',year:'numeric'}) : 'Date TBD')
        : (p.country||p.location||'Location TBD');
      if(!groups[key]) groups[key]=[];
      groups[key].push(p);
    });

    return(
      <div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <div style={{padding:'10px 14px',background:'#fffbeb',borderRadius:10,border:'1px solid #fde68a',fontSize:12,color:'#92400e',flex:1}}>
            <strong>Installation Team</strong> — equipment lead time <strong>{LEAD_MIN}–{LEAD_MAX} weeks</strong> from PO. Phone/email links are tappable.
          </div>
          <div style={{display:'flex',gap:4,background:'var(--surface)',borderRadius:8,border:'1px solid var(--border)',padding:4}}>
            {[['month','By Month'],['location','By Location']].map(([v,l])=>(
              <button key={v} onClick={()=>setGroupBy(v)} style={{padding:'5px 12px',borderRadius:6,border:'none',fontSize:12,cursor:'pointer',fontFamily:'var(--font)',background:groupBy===v?'#111827':'transparent',color:groupBy===v?'#fff':'var(--muted)',fontWeight:groupBy===v?600:400,transition:'all .15s'}}>{l}</button>
            ))}
          </div>
        </div>

        {!Object.keys(groups).length && <div className="empty"><p>No projects yet.</p></div>}

        {Object.entries(groups).map(([grp,projs])=>(
          <div key={grp} style={{marginBottom:28}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1.2,marginBottom:10,paddingBottom:6,borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
              {groupBy==='location' && <span style={{fontSize:18}}>{flag(grp)}</span>}
              {grp}
              <span style={{background:'var(--surface2)',borderRadius:20,padding:'1px 9px',fontWeight:600,color:'var(--text)',letterSpacing:0,fontSize:11,textTransform:'none'}}>{projs.length}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {projs.map(p=><InstallCard key={p.id} project={p} onDetail={onDetail}/>)}
            </div>
          </div>
        ))}
      </div>
    );
  }

  function InstallCard({project,onDetail}){
    const days=daysUntil(project.installDate);
    const weeks=weeksAgo(project.poDate);
    const stage=stageOf(project.stage);
    const urg=urgCol(days);
    const pct=Math.min(100,Math.max(0,((weeks||0)/LEAD_MAX)*100));
    const d=project.installDate?new Date(project.installDate):null;

    return(
      <div className="card" onClick={()=>onDetail(project.id)} style={{overflow:'hidden'}}>
        <div style={{display:'flex'}}>

          {/* Date column */}
          <div style={{width:74,flexShrink:0,background:'var(--surface2)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'16px 6px',borderRight:'1px solid var(--border)'}}>
            {d ? (
              <>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,color:'var(--muted)'}}>{d.toLocaleDateString('en-US',{month:'short'})}</div>
                <div style={{fontSize:30,fontWeight:800,lineHeight:1,color:'var(--text)',margin:'2px 0'}}>{d.getDate()}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>{d.getFullYear()}</div>
                <div style={{marginTop:7,fontSize:10,fontWeight:700,color:urg,textAlign:'center',lineHeight:1.2,padding:'2px 6px',background:urg+'18',borderRadius:4}}>
                  {days<0?`${Math.abs(days)}d\nlate`:days===0?'TODAY':days===1?'TMRW':`${days}d`}
                </div>
              </>
            ):(
              <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',lineHeight:1.4}}>Date<br/>TBD</div>
            )}
          </div>

          {/* Content */}
          <div style={{flex:1,minWidth:0,padding:'14px 16px',display:'flex',flexDirection:'column',gap:11}}>

            {/* Name + stage */}
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
              <div style={{fontSize:15,fontWeight:700,color:'var(--text)',lineHeight:1.2}}>{project.name}</div>
              <span className="badge" style={{background:stage.bg,color:stage.color,border:`1px solid ${stage.border}`,flexShrink:0}}>{stage.label}</span>
            </div>

            {/* LOCATION — prominent */}
            {(project.location||project.country) && (
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span className={`badge ${locCls(project.country)}`} style={{fontSize:13,padding:'5px 13px',display:'inline-flex',alignItems:'center',gap:7}}>
                  <span style={{fontSize:18,lineHeight:1}}>{flag(project.country)}</span>
                  <strong>{project.location||project.country}</strong>
                  {project.location&&project.country && <span style={{opacity:.65,fontWeight:400}}>· {project.country}</span>}
                </span>
                {project.sqft && (
                  <span style={{fontSize:12,color:'var(--muted)',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 9px'}}>
                    📐 {Number(project.sqft).toLocaleString()} sq ft
                  </span>
                )}
              </div>
            )}

            {/* CLIENT DETAILS */}
            {(project.client||project.company||project.contactPhone||project.contactEmail) && (
              <div style={{background:'var(--surface2)',borderRadius:10,padding:'10px 12px',border:'1px solid var(--border)'}}>
                <div className="section-label">Contact</div>
                <div style={{display:'flex',alignItems:'flex-start',gap:10,flexWrap:'wrap'}}>
                  {project.client && (
                    <div style={{display:'flex',alignItems:'center',gap:8,marginRight:8}}>
                      <div style={{width:32,height:32,borderRadius:'50%',background:'#e0e7ff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#4338ca',flexShrink:0}}>
                        {initials(project.client)}
                      </div>
                      <div>

  /* ═══════════════ ALL PROJECTS ═══════════════════════════ */
  function AllView({projects,onDetail,onEdit}){
    const [sort,setSort]     = useState('installDate');
    const [search,setSearch] = useState('');

    const filtered=projects.filter(p=>!search||
      [p.name,p.client,p.location,p.country,p.poNumber,p.company].some(v=>v?.toLowerCase().includes(search.toLowerCase()))
    );
    const sorted=[...filtered].sort((a,b)=>{
      if(sort==='installDate'){if(!a.installDate)return 1;if(!b.installDate)return -1;return new Date(a.installDate)-new Date(b.installDate);}
      if(sort==='name')     return a.name.localeCompare(b.name);
      if(sort==='stage')    return STAGES.findIndex(s=>s.id===a.stage)-STAGES.findIndex(s=>s.id===b.stage);
      if(sort==='location') return (a.country||'').localeCompare(b.country||'');
      return 0;
    });

    return(
      <div>
        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
          <input className="inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search projects…" style={{width:220}}/>
          <span style={{fontSize:12,color:'var(--muted)'}}>Sort:</span>
          {[['installDate','Install Date'],['name','Name'],['stage','Stage'],['location','Location']].map(([v,l])=>(
            <button key={v} className={`btn${sort===v?' primary':''}`} style={{padding:'5px 11px',fontSize:12}} onClick={()=>setSort(v)}>{l}</button>
          ))}
        </div>
        {!sorted.length
          ? <div className="empty"><p>No matching projects.</p></div>
          : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:10}}>
              {sorted.map(p=>{
                const s=stageOf(p.stage); const days=daysUntil(p.installDate);
                return(
                  <div key={p.id} className="card" onClick={()=>onDetail(p.id)} style={{padding:14}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <div style={{fontSize:13,fontWeight:700,lineHeight:1.3}}>{p.name}</div>
                      <span className="badge" style={{background:s.bg,color:s.color,border:`1px solid ${s.border}`,marginLeft:8}}>{s.label}</span>
                    </div>
                    {(p.location||p.country) && (
                      <span className={`badge ${locCls(p.country)}`} style={{fontSize:11,marginBottom:8,display:'inline-flex',alignItems:'center',gap:5}}>
                        <span style={{fontSize:14}}>{flag(p.country)}</span>
                        {[p.location,p.country].filter(Boolean).join(', ')}
                      </span>
                    )}
                    <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.9}}>
                      {p.client && <div>👤 <strong style={{color:'var(--text)'}}>{p.client}</strong>{p.contactRole?` · ${p.contactRole}`:''}</div>}
                      {p.company && <div>🏢 {p.company}</div>}
                      {p.installDate && <div style={{color:urgCol(days),fontWeight:600}}>🗓 {fmt(p.installDate)} {days!==null?`(${days<0?Math.abs(days)+'d late':days+'d away'})`:''}</div>}
                      {p.poNumber && <div>🔖 PO {p.poNumber}{p.poDate?` · ${fmt(p.poDate)}`:''}</div>}
                      {p.sqft && <div>📐 {Number(p.sqft).toLocaleString()} sq ft</div>}
                      {p.value && <div>💰 ${Number(p.value).toLocaleString()}</div>}
                    </div>
                    {p.documents?.length>0 && <div style={{marginTop:8,fontSize:11,color:'var(--muted)'}}>📎 {p.documents.length} document{p.documents.length!==1?'s':''}</div>}
                  </div>
                );
              })}
            </div>
        }
      </div>
    );
  }

  /* ═══════════════ PROJECT FORM ═══════════════════════════ */
  function ProjectForm({project,onSave,onClose}){
    const [form,setF]=useState(project?{...EMPTY,...project,documents:project.documents||[]}:{...EMPTY});
    const [newDocs,setND]=useState([]);
    const [saving,setSv]=useState(false);
    const ref=useRef();

    const set=(k,v)=>setF(f=>({...f,[k]:v}));

    const addFiles=files=>{
      Array.from(files).forEach(file=>{
        if(file.size>3.5*1024*1024){setND(d=>[...d,{name:file.name,size:file.size,type:file.type,data:null}]);return;}
        const r=new FileReader();
        r.onload=e=>setND(d=>[...d,{name:file.name,size:file.size,type:file.type,data:e.target.result}]);
        r.readAsDataURL(file);
      });
    };

    const submit=async()=>{
      if(!form.name.trim())return;
      setSv(true);
      await onSave({...form,documents:[...(form.documents||[]),...newDocs]});
      setSv(false);
    };

    const rf=form.poDate?fmt(addDays(form.poDate,LEAD_MIN*7)):null;
    const rt=form.poDate?fmt(addDays(form.poDate,LEAD_MAX*7)):null;

    return(
      <div className="modal-wrap" onClick={onClose}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <div style={{fontSize:16,fontWeight:800}}>{project?'Edit Project':'New Project'}</div>
            <button className="btn" style={{padding:'4px 10px'}} onClick={onClose}>✕</button>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label className="label">Project / Hotel Name *</label>
              <input className="inp" value={form.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Hyatt Centric San Juan"/>
            </div>

            {/* Location block */}
            <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:14}}>
              <div style={{fontSize:12,fontWeight:700,color:'#15803d',marginBottom:10}}>📍 Location</div>
              <div className="form-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:10}}>
                <div><label className="label">City</label><input className="inp" value={form.location} onChange={e=>set('location',e.target.value)} placeholder="e.g. San Juan"/></div>
                <div><label className="label">Country / Island</label><input className="inp" value={form.country} onChange={e=>set('country',e.target.value)} placeholder="e.g. Puerto Rico"/></div>
              </div>
              <div><label className="label">Gym Size (sq ft)</label><input className="inp" type="number" value={form.sqft} onChange={e=>set('sqft',e.target.value)} placeholder="e.g. 3500"/></div>
            </div>

            {/* Contact block */}
            <div style={{background:'#eef2ff',border:'1px solid #c7d2fe',borderRadius:10,padding:14}}>
              <div style={{fontSize:12,fontWeight:700,color:'#4338ca',marginBottom:10}}>👤 Contact Details</div>
              <div className="form-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:10}}>
                <div><label className="label">Contact Name</label><input className="inp" value={form.client} onChange={e=>set('client',e.target.value)} placeholder="e.g. Maria González"/></div>
                <div><label className="label">Role / Title</label><input className="inp" value={form.contactRole} onChange={e=>set('contactRole',e.target.value)} placeholder="e.g. Pre-Opening Manager"/></div>
              </div>
              <div style={{marginBottom:10}}><label className="label">Company / Organization</label><input className="inp" value={form.company} onChange={e=>set('company',e.target.value)} placeholder="e.g. Marriott International"/></div>
              <div className="form-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><label className="label">Phone</label><input className="inp" type="tel" value={form.contactPhone} onChange={e=>set('contactPhone',e.target.value)} placeholder="+1 787-555-0100"/></div>
                <div><label className="label">Email</label><input className="inp" type="email" value={form.contactEmail} onChange={e=>set('contactEmail',e.target.value)} placeholder="name@hotel.com"/></div>
              </div>
            </div>

            {/* PO block */}
            <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,padding:14}}>
              <div style={{fontSize:12,fontWeight:700,color:'#92400e',marginBottom:10}}>Purchase Order — starts the {LEAD_MIN}–{LEAD_MAX} week production clock</div>
              <div className="form-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><label className="label">PO Number</label><input className="inp" value={form.poNumber} onChange={e=>set('poNumber',e.target.value)} placeholder="e.g. PO-2025-001"/></div>
                <div><label className="label">PO Date</label><input className="inp" type="date" value={form.poDate} onChange={e=>set('poDate',e.target.value)}/></div>
              </div>
              {form.poDate && <div style={{marginTop:8,fontSize:12,color:'#92400e',background:'#fef3c7',borderRadius:6,padding:'6px 10px'}}>Equipment ready: <strong>{rf}</strong> → <strong>{rt}</strong></div>}
            </div>

            <div className="form-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><label className="label">Expected Install Date</label><input className="inp" type="date" value={form.installDate} onChange={e=>set('installDate',e.target.value)}/></div>
              <div><label className="label">Deal Value ($)</label><input className="inp" type="number" value={form.value} onChange={e=>set('value',e.target.value)} placeholder="0"/></div>

            <div><label className="label">Stage</label>
              <select className="inp" value={form.stage} onChange={e=>set('stage',e.target.value)}>
                {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}

            </div>

            {/* Documents */}
            <div>
              <label className="label">Documents & Floor Plans</label>
              <div className="upload-zone" onClick={()=>ref.current?.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();addFiles(e.dataTransfer.files);}}>
                <input ref={ref} type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.dwg,.dxf,.xlsx,.doc,.docx" style={{display:'none'}} onChange={e=>addFiles(e.target.files)}/>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="1.5" style={{display:'block',margin:'0 auto 6px'}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <div style={{fontSize:12,color:'var(--muted)'}}>Click or drag — floor plans, drawings, specs, photos</div>
                <div style={{fontSize:11,color:'#d1d5db',marginTop:3}}>PDF, PNG, JPG, DWG, DOCX · Over 3.5 MB stored as name only</div>
              </div>
              {[...(form.documents||[]).map((d,i)=>({...d,ex:true,i})),...newDocs.map((d,i)=>({...d,ex:false,i}))].length>0 && (
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:5}}>
                  {(form.documents||[]).map((doc,i)=>(
                    <div key={`e${i}`} style={{display:'flex',alignItems:'center',gap:7,fontSize:12,padding:'6px 10px',background:'var(--surface2)',borderRadius:7,border:'1px solid var(--border)'}}>
                      <span style={{flex:1,fontWeight:500}}>{doc.name}</span>
                      {doc.size&&<span style={{color:'var(--muted)',fontSize:11}}>{(doc.size/1024).toFixed(0)} KB</span>}
                      <button onClick={()=>set('documents',(form.documents||[]).filter((_,j)=>j!==i))} style={{border:'none',background:'none',cursor:'pointer',color:'#ef4444',fontSize:16,padding:'0 2px'}}>×</button>
                    </div>
                  ))}
                  {newDocs.map((doc,i)=>(
                    <div key={`n${i}`} style={{display:'flex',alignItems:'center',gap:7,fontSize:12,padding:'6px 10px',background:'#f0fdf4',borderRadius:7,border:'1px solid #bbf7d0'}}>
                      <span style={{flex:1,fontWeight:500}}>{doc.name}</span>
                      <span style={{color:'#16a34a',fontSize:11,fontWeight:600}}>{doc.data?'ready':'name only'}</span>
                      <button onClick={()=>setND(d=>d.filter((_,j)=>j!==i))} style={{border:'none',background:'none',cursor:'pointer',color:'#ef4444',fontSize:16,padding:'0 2px'}}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div>
              <label className="label">Notes for Installation Team</label>
              <textarea className="inp" rows={3} value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Access hours, on-site contact, parking, permit status, special requirements…" style={{resize:'vertical'}}/>
            </div>

            <div style={{display:'flex',gap:8,paddingTop:4}}>
              <button className="btn" style={{flex:1}} onClick={onClose}>Cancel</button>
              <button className="btn primary" style={{flex:2}} onClick={submit} disabled={saving||!form.name.trim()}>{saving?'Saving…':project?'Save Changes':'Add Project'}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
